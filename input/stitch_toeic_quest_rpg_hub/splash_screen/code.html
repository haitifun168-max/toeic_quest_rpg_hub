<style>
        body {

            padding: 0;
            background-color: #12121d;

        .gold-glow {

        .loading-shimmer {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0) 0%, rgba(210, 187, 255, 0.8) 50%, rgba(124, 58, 237, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

<!-- Subtle Particle Effect Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            let width = 0;

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Add transition or redirect logic here
                } else {
                    width += Math.random() * 2.5;
                    if (width > 100) width = 100;
                    progressBar.style.width = width + '%';
                    progressText.innerText = Math.floor(width) + '%';
                }
            }, 50);
        });

        // Interactive mouse movement effect for glass glow
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const container = document.querySelector('.floating');
            if(container) {
                container.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
