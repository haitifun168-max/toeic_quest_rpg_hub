<script>
        // Simple micro-interaction for the buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.96)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Atmospheric red pulse effect for the background overlay
        const overlay = document.querySelector('.incorrect-overlay');
        let opacity = 0.2;
        let increasing = true;

        function pulse() {
            if (increasing) {
                opacity += 0.002;
                if (opacity >= 0.3) increasing = false;
            } else {
                opacity -= 0.002;
                if (opacity <= 0.15) increasing = true;
            }
            overlay.style.background = `linear-gradient(to top, rgba(18, 18, 29, 0.95), rgba(147, 0, 10, ${opacity}))`;
            requestAnimationFrame(pulse);
        }
        pulse();
    </script>
