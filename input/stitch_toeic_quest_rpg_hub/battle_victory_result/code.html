<!-- Celebration Layer Scripts -->
<script>
        function createParticles() {
            const container = document.body;
            const colors = ['#7C3AED', '#4EDE A3', '#FFD700', '#F1F5F9'];
            
            // Create Confetti
            for(let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `confetti-fall ${2 + Math.random() * 3}s linear forwards`;
                confetti.style.delay = Math.random() * 2 + 's';
                container.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }

            // Create Gold Particles
            for(let i = 0; i < 20; i++) {
                const gold = document.createElement('div');
                gold.className = 'gold-particle';
                const size = 2 + Math.random() * 4;
                gold.style.width = size + 'px';
                gold.style.height = size + 'px';
                gold.style.left = Math.random() * 100 + 'vw';
                gold.style.top = Math.random() * 100 + 'vh';
                gold.style.opacity = Math.random();
                
                // Floating animation
                gold.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 0 },
                    { transform: `translateY(-${50 + Math.random() * 100}px) scale(1.5)`, opacity: 0.8 },
                    { transform: `translateY(-${150 + Math.random() * 100}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 3000 + Math.random() * 3000,
                    iterations: Infinity,
                    delay: Math.random() * 2000
                });
                
                container.appendChild(gold);
            }
        }

        window.onload = createParticles;
    </script>
