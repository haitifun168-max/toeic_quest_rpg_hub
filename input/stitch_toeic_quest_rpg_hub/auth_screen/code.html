            font-family: 'Inter', sans-serif;
            background-color: #12121d;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            color: #e3e0f1;
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);

        .neon-glow-purple {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .input-focus-ring:focus-within {
            border-color: #d2bbff;
            box-shadow: 0 0 0 2px rgba(210, 187, 255, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(210, 187, 255, 0.3);
            border-radius: 10px;
        }
    </style>

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex items-center justify-center min-h-screen relative overflow-hidden">
<!-- Atmospheric Background Animation -->
<div class="fixed inset-0 z-0">

<!-- Overlay for additional depth -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/20 via-surface/60 to-surface"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-[390px] px-margin-mobile flex flex-col items-center justify-center">
<!-- Brand Logo / Identity -->
<div class="mb-lg text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">TOEIC QUEST</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Chinh phục đỉnh cao tri thức</p>
</div>
<!-- Auth GlassPanel -->
<div class="glass-panel w-full rounded-xl p-lg flex flex-col gap-lg shadow-2xl">
<!-- Tabs Navigation -->
<div class="flex border-b border-glass-border">
<button class="flex-1 pb-md font-body-lg text-body-lg text-primary border-b-2 border-primary transition-all">
                    Đăng nhập
                </button>
<button class="flex-1 pb-md font-body-lg text-body-lg text-on-surface-variant hover:text-on-surface transition-all">
                    Đăng ký
                </button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Email</label>
<div class="glass-panel input-focus-ring flex items-center px-md py-sm rounded-lg transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">enable</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline text-body-md font-body-md focus:ring-0 p-0" placeholder="example@gmail.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Mật khẩu</label>
<div class="glass-panel input-focus-ring flex items-center px-md py-sm rounded-lg transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">lock</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline text-body-md font-body-md focus:ring-0 p-0" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" type="button">visibility</button>
</div>
</div>
<!-- CTA Button -->
<button class="mt-xs h-[52px] w-full rounded-full bg-primary-container text-on-primary-container font-body-lg text-body-lg flex items-center justify-center neon-glow-purple hover:scale-[1.02] active:scale-95 transition-all" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Forgot Password Link -->
<div class="text-center">
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="flex-1 h-[1px] bg-glass-border"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Hoặc</span>
<div class="flex-1 h-[1px] bg-glass-border"></div>
</div>
<!-- Social Auth -->
<div class="flex flex-col gap-sm">
<button class="h-[52px] w-full rounded-full glass-panel flex items-center justify-center gap-md hover:bg-white/10 transition-all">
<img class="w-5 h-5" data-alt="The Google company logo in its official vibrant four-color palette, designed with a clean, high-resolution vector style. The logo is set against a dark, futuristic UI background with soft purple glows and glassmorphism elements, maintaining a professional and modern aesthetic consistent with the Cyber-Scholar design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoeIgqPK92DWG4iiKk0UaT4rnZUZr9De8mUQurzGIGovyXSRzEbQFk2v5U5L3zexGpPeAaoLL-_wkMm22AztDHGiBGZunDagCKnHn8ERNXfbBOfHnGM4wLxkdzOkGUQSw7jxUExKVcwRHhwqC9m1DsQRWOyW3eIzDWbmmUt9vOJiYRNKOGkU8i6aTRq6-d-KT9_h_amT6DP6BT1UBKGvOcKwyK7qPnTIded8k1C2lKzBz_RELL2jU_d2lRguQqfi-ZEhxWOA-eenJA"/>
<span class="font-body-md text-body-md text-on-surface">Đăng nhập với Google</span>
</button>
<button class="h-[52px] w-full rounded-full glass-panel flex items-center justify-center gap-md hover:bg-white/10 transition-all">
<img class="w-5 h-5" data-alt="The Facebook brand icon, featuring the iconic white letter f on a blue circular background, rendered in a high-fidelity modern digital style. The icon is placed within a dark-mode user interface that uses translucent glass panels, neon purple accents, and high-tech typography, creating an integrated and cohesive visual experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcS7l9fiEFZkIFzFS8zCySul4Jgl-JfBShjnM9O1O_xx7XwFQW3g0GHVpUiF1VkeZFzYQG5mXii5hStRBuBsrY0oXged-mIZPgef_8p2BX6mu07KtI7hg6TQ1y1U526kbM6abX1F_ED8TZozpTNVw_qOpFxMXPW4gnl-3HlA84crGW3imMCR8_j6lif50jjI8HlkfhTYg507ouKQPbpDv_Jh7Nf5y4GNe0iIoqHrHXeBtBtK0h-COY1HxDLj_tLD-ORfCoYohTNyX6"/>
<span class="font-body-md text-body-md text-on-surface">Đăng nhập với Facebook</span>
</button>
</div>
</div>
<!-- Footer Note -->
<p class="mt-xl font-label-sm text-label-sm text-on-surface-variant text-center px-md opacity-70">
            Bằng cách tiếp tục, bạn đồng ý với <a class="text-primary hover:underline" href="#">Điều khoản Dịch vụ</a> và <a class="text-primary hover:underline" href="#">Chính sách Bảo mật</a> của chúng tôi.
        </p>
</main>
<!-- Micro-interaction Script -->
<script>
        // Simple visual feedback for button clicks
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = '';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });

        // Form submit prevention for demo
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            console.log("Auth attempt triggered");
        });
    </script>
</body></html>
