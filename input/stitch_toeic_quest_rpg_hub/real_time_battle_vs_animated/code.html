<style>
        body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        /* VS Badge Pulse */
        @keyframes vs-heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(124, 58, 237, 0.6); }
            50% { transform: scale(1.1); box-shadow: 0 0 35px rgba(124, 58, 237, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(124, 58, 237, 0.6); }
        }
        .vs-badge-animate {
            background: linear-gradient(135deg, #7C3AED 0%, #D2BBFF 100%);
            animation: vs-heartbeat 2s infinite ease-in-out;
        }

        /* Countdown Progress Circle */
        .countdown-svg {
            transform: rotate(-90deg);
        }
        .countdown-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 3;
        }
        .countdown-circle-progress {
            fill: none;
            stroke: #7c3aed;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 20; /* Dynamic property managed by JS/CSS */
            transition: stroke-dashoffset 1s linear;
        }

        /* Warning Pulse for Timer */
        @keyframes timer-warning {
            0%, 100% { color: #d2bbff; }
            50% { color: #EF4444; transform: scale(1.1); }
        }
        .timer-low {
            animation: timer-warning 1s infinite ease-in-out;
        }

        /* Thinking Dots Animation */
        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60% { content: "..."; }
            80%, 100% { content: ""; }
        }
        .thinking-dots::after {
            content: ".";
            display: inline-block;
            width: 1.5em;
            text-align: left;
            animation: dots 1.5s infinite;
        }

        /* Profile Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating-profile {
            animation: float 4s infinite ease-in-out;
        }

        /* Entrance Animations */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-1 { animation: fade-in-up 0.6s ease-out forwards; opacity: 0; }
        .stagger-2 { animation: fade-in-up 0.6s ease-out 0.2s forwards; opacity: 0; }
        .stagger-3 { animation: fade-in-up 0.6s ease-out 0.4s forwards; opacity: 0; }
        .stagger-4 { animation: fade-in-up 0.6s ease-out 0.6s forwards; opacity: 0; }
    </style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Selection Logic
        const options = document.querySelectorAll('.quiz-option');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                options.forEach(o => {
                    o.classList.remove('border-primary', 'bg-primary-container/20', 'shadow-[0_0_15px_rgba(124,58,237,0.2)]');
                    const letter = o.querySelector('div');
                    letter.classList.add('bg-surface-container', 'text-on-surface-variant');
                    letter.classList.remove('bg-primary-container', 'text-white');
                });
                opt.classList.add('border-primary', 'bg-primary-container/20', 'shadow-[0_0_15px_rgba(124,58,237,0.2)]');
                const selectedLetter = opt.querySelector('div');
                selectedLetter.classList.remove('bg-surface-container', 'text-on-surface-variant');
                selectedLetter.classList.add('bg-primary-container', 'text-white');
            });
        });

        // Timer Simulation
        let timeLeft = 18;
        const totalTime = 20;
        const timerText = document.getElementById('countdown-text');
        const timerStroke = document.getElementById('timer-stroke');
        
        const updateTimer = () => {
            if (timeLeft <= 0) return;
            timeLeft--;
            timerText.innerText = timeLeft + 's';
            
            // Progress circle calculation
            const percentage = (timeLeft / totalTime) * 100;
            timerStroke.style.strokeDashoffset = 100 - percentage;
            
            // Warning Pulse
            if (timeLeft <= 5) {
                timerText.classList.add('timer-low');
                timerStroke.style.stroke = '#EF4444';
            }
        };
        
        setInterval(updateTimer, 1000);
    });
</script>
