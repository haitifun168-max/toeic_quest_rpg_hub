<!-- Interactive Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const opponentPlaceholder = document.querySelector('.animate-pulse-soft');
            
            // Subtle movement on mouse move
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                
                const players = document.querySelectorAll('.group, .animate-pulse-soft');
                players.forEach((el, index) => {
                    const factor = index === 0 ? 1 : -1;
                    el.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
                });
            });

            // Simulated Match Found effect after 5 seconds
            setTimeout(() => {
                console.log("Match Found! Simulating UI transition...");

            }, 8000);
        });
