            pointer-events: none;
            z-index: 50;

        .gold-particle {

            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            z-index: 50;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entrance-anim {
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;

<!-- Celebration Layer Scripts -->
<script>
    function createParticles() {
        const container = document.body;
        const colors = ['#7C3AED', '#4EDE A3', '#FFD700', '#F1F5F9', '#D2BBFF'];
        
        // Initial Burst of Confetti
        for(let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const duration = 2 + Math.random() * 3;
            const delay = Math.random() * 1.5;
            confetti.style.animation = `confetti-fall ${duration}s linear forwards`;
            confetti.style.animationDelay = `${delay}s`;
            container.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), (duration + delay) * 1000);
        }

        // Floating Gold Particles (Cyber Glow)
        for(let i = 0; i < 25; i++) {
            const gold = document.createElement('div');
            gold.className = 'gold-particle';
            const size = 2 + Math.random() * 5;
            gold.style.width = size + 'px';
            gold.style.height = size + 'px';
            gold.style.left = Math.random() * 100 + 'vw';
            gold.style.top = Math.random() * 100 + 'vh';
            gold.style.opacity = '0';
            
            gold.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0 },
                { transform: `translateY(-${50 + Math.random() * 100}px) scale(1.5)`, opacity: 0.8 },
                { transform: `translateY(-${150 + Math.random() * 100}px) scale(0)`, opacity: 0 }
            ], {
                duration: 3000 + Math.random() * 3000,
                iterations: Infinity,
                delay: Math.random() * 2000
            });
            
            container.appendChild(gold);
        }
    }

    function animateCounters() {
        const counters = [
            { id: 'elo-counter', target: 1180, duration: 1500, delay: 500 },
            { id: 'kp-counter', target: 300, duration: 1500, delay: 1000 }
        ];

        counters.forEach(counter => {
            const el = document.getElementById(counter.id);
            if (!el) return;

            setTimeout(() => {
                let start = 0;
                const end = parseInt(el.getAttribute('data-target'));
                const range = end - start;
                const startTime = performance.now();

                function update(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / counter.duration, 1);
                    // Ease out quadratic
                    const easedProgress = progress * (2 - progress);
                    const currentCount = Math.floor(easedProgress * range + start);
                    
                    el.textContent = currentCount.toLocaleString();

                    if (progress < 1) {
                        requestAnimationFrame(update);
                    } else {
                        el.textContent = end.toLocaleString();
                    }
                }
                requestAnimationFrame(update);
            }, counter.delay);
        });
    }

    window.onload = () => {
        createParticles();
        animateCounters();
    };
</script>
