<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TOEIC QUEST - Placement Test</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .neon-glow-purple {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }
        .progress-glow {
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.6);
        }
        body {
            background-color: #12121d;
            overflow-x: hidden;
        }
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1f1e2a 0%, #12121d 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#292935",
                        "glass-surface": "rgba(255, 255, 255, 0.08)",
                        "on-surface-variant": "#ccc3d8",
                        "tertiary-fixed": "#6ffbbe",
                        "on-primary": "#3f008e",
                        "on-surface": "#e3e0f1",
                        "background": "#12121d",
                        "primary-container": "#7c3aed",
                        "on-primary-container": "#ede0ff",
                        "glass-border": "rgba(255, 255, 255, 0.15)",
                        "primary": "#d2bbff",
                        "text-primary": "#F1F5F9",
                        "text-muted": "#94A3B8",
                        "success-green": "#10B981",
                        "error-red": "#EF4444"
                    },
                    "spacing": {
                        "base": "4px",
                        "md": "16px",
                        "lg": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-surface antialiased">
<!-- Background Shader -->
<div class="cyber-bg">

</div>
<!-- Header Section (TopAppBar mapping) -->
<header class="fixed top-0 w-full z-50 bg-glass-surface backdrop-blur-xl border-b border-glass-border h-24 px-margin-mobile flex flex-col justify-center shadow-lg shadow-primary/10">
<div class="flex items-center justify-between mb-3 mt-2">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-glass-surface border border-glass-border active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="font-headline-sm text-headline-sm text-primary tracking-tight">Câu 5/20</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Part 5: Hoàn thành câu</span>
</div>
</div>
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-glass-border">
<span class="material-symbols-outlined text-primary text-[18px]">timer</span>
<span class="font-label-sm text-label-sm text-primary font-bold">15:00</span>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full h-1.5 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-success-green w-1/4 progress-glow transition-all duration-500 relative">
<div class="absolute right-0 top-0 h-full w-2 bg-white blur-sm"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-32 pb-24 px-margin-mobile min-h-screen flex flex-col gap-lg">
<!-- Question Card -->
<section class="glass-panel p-lg rounded-xl shadow-2xl relative overflow-hidden">
<div class="absolute -top-12 -right-12 w-24 h-24 bg-primary/10 rounded-full blur-3xl"></div>
<div class="flex items-start gap-3 mb-4">
<span class="flex-none w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container font-bold">Q</span>
<h2 class="font-headline-sm text-headline-sm text-text-primary leading-relaxed">
                    The manager asked all employees to submit their reports <span class="text-primary border-b-2 border-dashed border-primary px-2">_______</span> Friday.
                </h2>
</div>
<div class="flex items-center gap-2 mt-6 py-2 px-3 bg-surface-container-low rounded-lg w-fit border border-glass-border">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]">info</span>
<p class="font-label-sm text-label-sm text-on-surface-variant italic">Chọn giới từ phù hợp để chỉ thời hạn (deadline).</p>
</div>
</section>
<!-- Options Bento Grid-ish Layout -->
<section class="flex flex-col gap-md">
<!-- Option A -->
<button class="glass-panel group w-full h-[64px] px-md rounded-xl flex items-center justify-between border-glass-border hover:border-primary/50 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-lg bg-surface-variant flex items-center justify-center font-bold text-on-surface-variant group-hover:text-primary transition-colors">A</div>
<span class="font-body-lg text-body-lg text-on-surface">until</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
<!-- Option B (Selected) -->
<button class="w-full h-[64px] px-md rounded-xl flex items-center justify-between bg-primary-container/30 border-2 border-primary-container neon-glow-purple relative overflow-hidden transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center font-bold text-on-primary-container shadow-lg">B</div>
<span class="font-body-lg text-body-lg text-white">by</span>
</div>
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center shadow-[0_0_10px_rgba(210,187,255,0.8)]">
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</div>
<!-- Selection Glow Effect -->
<div class="absolute inset-0 bg-gradient-to-r from-white/5 to-transparent pointer-events-none"></div>
</button>
<!-- Option C -->
<button class="glass-panel group w-full h-[64px] px-md rounded-xl flex items-center justify-between border-glass-border hover:border-primary/50 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-lg bg-surface-variant flex items-center justify-center font-bold text-on-surface-variant group-hover:text-primary transition-colors">C</div>
<span class="font-body-lg text-body-lg text-on-surface">since</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
<!-- Option D -->
<button class="glass-panel group w-full h-[64px] px-md rounded-xl flex items-center justify-between border-glass-border hover:border-primary/50 transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-lg bg-surface-variant flex items-center justify-center font-bold text-on-surface-variant group-hover:text-primary transition-colors">D</div>
<span class="font-body-lg text-body-lg text-on-surface">for</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
</section>
<!-- Contextual Visual (Decorative) -->
<div class="mt-4 flex flex-col items-center">
<div class="w-24 h-24 opacity-50 grayscale hover:grayscale-0 transition-all duration-700">

</div>
<p class="font-label-sm text-label-sm text-muted text-center max-w-[240px] mt-2 italic">Dựa trên ngữ cảnh: Sếp yêu cầu nộp báo cáo trước một mốc thời gian cụ thể.</p>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 w-full p-margin-mobile bg-gradient-to-t from-background via-background/90 to-transparent pt-12 pb-8">
<button class="w-full h-[52px] rounded-full bg-gradient-to-r from-[#7C3AED] to-[#9333EA] text-white font-bold text-body-lg shadow-[0_0_20px_rgba(124,58,237,0.5)] active:scale-95 transition-transform flex items-center justify-center gap-2">
<span>KIỂM TRA ĐÁP ÁN</span>
<span class="material-symbols-outlined">bolt</span>
</button>
</div>
<script>
        // Micro-interaction for timer
        let timeLeft = 900; // 15 minutes in seconds
        const timerDisplay = document.querySelector('.font-bold.text-primary');
        
        const updateTimer = () => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if(timeLeft > 0) timeLeft--;
        };

        setInterval(updateTimer, 1000);

        // Simple button active state visual feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                // Haptic feedback logic could go here
            });
        });
    </script>
</body></html>
