<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .neon-glow-primary {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }

        .neon-glow-timer {
            text-shadow: 0 0 8px rgba(255, 185, 95, 0.6);
        }

        .progress-gradient {
            background: linear-gradient(90deg, #7c3aed 0%, #4edea3 100%);
        }

        body {
            background-color: #12121d;
            color: #e3e0f1;
            overflow-x: hidden;
        }

        @keyframes pulse-timer {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-pulse-timer {
            animation: pulse-timer 2s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="dark font-body-md text-body-md min-h-screen flex flex-col">
<!-- Background Layer -->
<div class="fixed inset-0 z-[-1]">

<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background/60 to-background"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-glass-surface backdrop-blur-md border-b border-glass-border shadow-[0_8px_32px_rgba(0,0,0,0.4)] h-16 flex items-center px-margin-mobile justify-between">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="font-headline-sm text-headline-sm text-primary tracking-tight leading-none">PART 5</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Question 5/20</span>
</div>
</div>
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-glass-border animate-pulse-timer">
<span class="material-symbols-outlined text-secondary text-[20px]">schedule</span>
<span class="font-headline-sm text-headline-sm text-secondary neon-glow-timer tabular-nums">14:35</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 mt-20 mb-24 px-margin-mobile max-w-2xl mx-auto w-full flex flex-col gap-lg">
<!-- Question Card -->
<section class="glass-panel rounded-xl p-6 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-[80px]">menu_book</span>
</div>
<div class="flex items-center gap-2 mb-4">
<span class="bg-primary-container text-on-primary-container font-badge-xs text-badge-xs px-2 py-0.5 rounded uppercase">Grammar Quest</span>
<span class="text-on-surface-variant text-label-sm font-label-sm">Incomplete Sentences</span>
</div>
<h2 class="font-headline-md text-headline-md-mobile text-text-primary leading-snug">
                The manager asked all employees to submit their reports <span class="text-primary border-b-2 border-primary/40 px-2 min-w-[80px] inline-block text-center">_______</span> Friday.
            </h2>
</section>
<!-- Options Container -->
<section class="flex flex-col gap-md">
<!-- Option A -->
<button class="glass-panel w-full p-md rounded-xl flex items-center gap-4 transition-all hover:border-primary/50 group active:scale-[0.98]">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center font-bold text-primary border border-glass-border group-hover:bg-primary/20">A</div>
<span class="font-body-lg text-body-lg text-on-surface">until</span>
</button>
<!-- Option B (Selected State) -->
<button class="w-full p-md rounded-xl flex items-center gap-4 transition-all scale-[1.02] neon-glow-primary border-2 border-primary-container bg-primary-container/20">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center font-bold text-white shadow-sm shadow-black/40">B</div>
<span class="font-body-lg text-body-lg text-white font-bold">by</span>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option C -->
<button class="glass-panel w-full p-md rounded-xl flex items-center gap-4 transition-all hover:border-primary/50 group active:scale-[0.98]">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center font-bold text-primary border border-glass-border group-hover:bg-primary/20">C</div>
<span class="font-body-lg text-body-lg text-on-surface">since</span>
</button>
<!-- Option D -->
<button class="glass-panel w-full p-md rounded-xl flex items-center gap-4 transition-all hover:border-primary/50 group active:scale-[0.98]">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center font-bold text-primary border border-glass-border group-hover:bg-primary/20">D</div>
<span class="font-body-lg text-body-lg text-on-surface">for</span>
</button>
</section>
<!-- Action Area -->
<div class="mt-4">
<button class="w-full h-[52px] bg-primary-container text-on-primary-container rounded-full font-headline-sm text-headline-sm shadow-[0_0_15px_rgba(124,58,237,0.5)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>SUBMIT ANSWER</span>
<span class="material-symbols-outlined">bolt</span>
</button>
</div>

<!-- Footer Progress Shell -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-container/90 backdrop-blur-xl border-t border-glass-border h-20 px-margin-mobile flex flex-col justify-center gap-2">
<div class="flex justify-between items-center px-1">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Level 24 Explorer</span>
<span class="font-label-sm text-label-sm text-secondary font-bold">25% Complete</span>
</div>
<div class="w-full h-3 bg-surface-variant rounded-full overflow-hidden border border-glass-border">
<div class="h-full progress-gradient rounded-full relative" style="width: 25%">
<div class="absolute right-0 top-0 h-full w-2 bg-white/40 blur-[2px]"></div>
</div>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        // Simple timer simulation
        let timeLeft = 14 * 60 + 35;
        const timerElement = document.querySelector('.neon-glow-timer');
        
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);

        // Click handler for options
        document.querySelectorAll('button.glass-panel').forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove selected classes from others
                document.querySelectorAll('.neon-glow-primary').forEach(el => {
                    el.classList.remove('neon-glow-primary', 'scale-[1.02]', 'border-2', 'border-primary-container', 'bg-primary-container/20');
                    el.classList.add('glass-panel');
                    const text = el.querySelector('span');
                    if(text) text.classList.remove('text-white', 'font-bold');
                    const icon = el.querySelector('.ml-auto');
                    if(icon) icon.remove();
                });

                // Apply to this
                this.classList.remove('glass-panel');
                this.classList.add('neon-glow-primary', 'scale-[1.02]', 'border-2', 'border-primary-container', 'bg-primary-container/20');
                const text = this.querySelector('span');
                if(text) text.classList.add('text-white', 'font-bold');
                
                if (!this.querySelector('.ml-auto')) {
                    const check = document.createElement('div');
                    check.className = 'ml-auto';
                    check.innerHTML = '<span class="material-symbols-outlined text-primary" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                    this.appendChild(check);
                }
            });
        });
    </script>
</body></html>
