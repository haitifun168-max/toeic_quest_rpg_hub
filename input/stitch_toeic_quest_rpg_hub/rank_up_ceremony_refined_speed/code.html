<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes shine {
            0% { transform: rotate(0deg) scale(1); opacity: 0.5; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 0.8; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.5; }
        }
        @keyframes particleUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-shine { animation: shine 20s linear infinite; }
        .particle {
            position: absolute;
            bottom: 0;
            width: 4px;
            height: 4px;
            background: #d2bbff;
            border-radius: 50%;
            pointer-events: none;
        }
        .rank-glow {

<script>
        // Particle Generator
        const container = document.getElementById('particle-container');
        const particleCount = 40;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 6 + 2;
            const left = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;
            const colors = ['#d2bbff', '#ffb95f', '#4edea3', '#ffffff'];
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animation = `particleUp ${duration}s ease-out ${delay}s infinite`;
            particle.style.boxShadow = `0 0 ${size*2}px ${particle.style.backgroundColor}`;
            
            container.appendChild(particle);
        }

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Haptic Feedback Simulation on CTAs
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            });
        });

        // Trigger entrance animations
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.transform');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                    item.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                }, 100 * index);
            });
        });
    </script>
